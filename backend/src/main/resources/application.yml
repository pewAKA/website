spring:
  application:
    name: personal-website-api
  config:
    # IDEA 本地启动时自动读取被 Git 忽略的 .env.local；服务器不存在该文件时跳过。
    import: optional:file:./.env.local[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/personal_website?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:website_app}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: false

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  address: ${SERVER_ADDRESS:127.0.0.1}
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: PT12H
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  bootstrap:
    admin-username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
