services:
  api:
    build:
      context: .
    container_name: personal-website-api
    # 共享宿主机网络，使应用安全访问原生 MySQL 的 127.0.0.1。
    network_mode: host
    env_file:
      - .env
    environment:
      APP_MEDIA_ROOT: /app/uploads
    volumes:
      # 生产环境请把 APP_MEDIA_HOST_PATH 指向 Nginx 可读取且会备份的绝对目录。
      - ${APP_MEDIA_HOST_PATH:-./data/uploads}:/app/uploads
    restart: unless-stopped
